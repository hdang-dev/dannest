name: deploy

# Run on every push to main: check the code, then deploy if the checks pass.
on:
  push:
    branches: [main]

jobs:
  # ---- Check the web app (Next.js) ----
  check-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ---- Check the backend (Spring Boot) — its test needs a database ----
  check-service:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: dannest
          POSTGRES_PASSWORD: dannest
          POSTGRES_DB: dannest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dannest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: service
    env:
      DB_URL: jdbc:postgresql://localhost:5432/dannest
      DB_USER: dannest
      DB_PASSWORD: dannest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew build --no-daemon

  # ---- Deploy both services to Render (only if BOTH checks passed) ----
  deploy:
    needs: [check-web, check-service]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy — backend
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/srv-d955uk0js32c73ffde7g/deploys"
      - name: Trigger Render deploy — web
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/srv-d955uk3tqb8s73eer9bg/deploys"
